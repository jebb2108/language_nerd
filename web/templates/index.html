<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Словарь Telegram-бота</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="book-container">
        <div class="book-header">
            <div class="book-title">
                <i class="fas fa-book"></i> Мой словарь
            </div>
            <div class="user-info">
                Пользователь ID: <span id="userId">загрузка...</span>
            </div>
        </div>

        <div class="bookmarks-sidebar bookmarks">
            <div class="bookmark active" data-page="home-page">
                <i class="fas fa-home"></i> Главная
            </div>
            <div class="bookmark" data-page="add-word">
                <i class="fas fa-plus-circle"></i> Добавить слово
            </div>
            <div class="bookmark" data-page="search-word">
                <i class="fas fa-search"></i> Поиск слова
            </div>
            <div class="bookmark" data-page="instructions">
                <i class="fas fa-info-circle"></i> Инструкция
            </div>
            <div class="bookmark" data-page="all-words">
                <i class="fas fa-book-open"></i> Весь словарь
            </div>
            <div class="bookmark" data-page="statistics">
                <i class="fas fa-chart-bar"></i> Статистика
            </div>
        </div>

        <div class="content-area">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
            </div>

            <div id="home-page" class="page active">
                <h2 class="page-title"><i class="fas fa-home"></i> Главная</h2>
                <div class="result-card">
                    <h3>Привет, <span id="userName"></span>! 👋</h3>
                    <div style="margin-top: 20px; font-size: 1.1rem; color: #5a5a5a;">
                        <p>Выучено слов за неделю: <span id="wordsLearned" style="font-weight: bold; color: #2e7d32;">0</span></p>
                        <p>Ваш статус: <span id="userStatus" style="font-weight: bold; color: #2e7d32;"></span></p>
                    </div>
                </div>
            </div>

            <div id="add-word" class="page">
                </div>

            <div id="search-word" class="page">
                </div>

            <div id="instructions" class="page">
                </div>

            <div id="all-words" class="page">
                </div>

            <div id="statistics" class="page">
                </div>

            <div class="book-footer">
                <p>Telegram Vocabulary Bot &copy; 2025 | Словарь знаний</p>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
